name: Build Gentoo RAP Prefix

on:
  schedule:
    - cron: "0 3 * * *" # daily at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stage1:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6
      - name: Build Stage 1
        run: |
          chmod +x bootstrap-prefix-with-root.sh build.sh
          docker run --rm --privileged -v "$PWD":/workspace:z -w /workspace \
            gentoo/stage3:nomultilib-systemd /workspace/build.sh stage1
      - name: Upload Stage 1 State
        uses: actions/upload-artifact@v4
        with:
          name: prefix-stage1
          path: output.tar.gz
          retention-days: 1

  stage2:
    needs: stage1
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6
      - name: Download Stage 1 State
        uses: actions/download-artifact@v4
        with:
          name: prefix-stage1
          path: .
      - name: Prepare input tarball
        run: mv output.tar.gz input.tar.gz
      - name: Build Stage 2
        run: |
          chmod +x bootstrap-prefix-with-root.sh build.sh
          docker run --rm --privileged -v "$PWD":/workspace:z -w /workspace \
            gentoo/stage3:nomultilib-systemd /workspace/build.sh stage2
      - name: Upload Stage 2 State
        uses: actions/upload-artifact@v4
        with:
          name: prefix-stage2
          path: output.tar.gz
          retention-days: 1

  stage3:
    needs: stage2
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6
      
      - name: Set build metadata
        id: meta
        run: |
          DATE=$(date -u +%Y-%m-%d)
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "tag=v${DATE}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "artifact=gentoo-prefix-rap-x86_64-${DATE}-${SHORT_SHA}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Download Stage 2 State
        uses: actions/download-artifact@v4
        with:
          name: prefix-stage2
          path: .
      - name: Prepare input tarball
        run: mv output.tar.gz input.tar.gz

      - name: Build Stage 3
        run: |
          chmod +x bootstrap-prefix-with-root.sh build.sh
          docker run --rm --privileged -v "$PWD":/workspace:z -w /workspace \
            gentoo/stage3:nomultilib-systemd /workspace/build.sh stage3
            
      - name: Prepare final artifact and checksum
        env:
          ARTIFACT: ${{ steps.meta.outputs.artifact }}
        run: |
          mv output.tar.gz "$ARTIFACT"
          sha256sum "$ARTIFACT" > "${ARTIFACT}.sha256"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Gentoo RAP Prefix ${{ steps.meta.outputs.date }} (${{ steps.meta.outputs.sha }})
          prerelease: true
          body: |
            Daily build of a Gentoo RAP prefix for x86_64.

            - Date: `${{ steps.meta.outputs.date }}`
            - Commit: `${{ github.sha }}`
            - Base image: `gentoo/stage3:nomultilib-systemd` (latest)

            Install system-wide:
            ```bash
            sudo tar --xattrs --acls --absolute-names \
              -xzvf ${{ steps.meta.outputs.artifact }} -C /
            /usr/lib/gentoo-prefix/startprefix
            ```
          files: |
            ${{ steps.meta.outputs.artifact }}
            ${{ steps.meta.outputs.artifact }}.sha256
          fail_on_unmatched_files: true

      - name: Prune old releases (keep latest 14)
        env:
          GH_TOKEN: ${{ github.token }}
          KEEP: 14
        run: |
          set -euo pipefail
          mapfile -t OLD < <(
            gh release list \
              --repo "$GITHUB_REPOSITORY" \
              --limit 1000 \
              --json tagName,createdAt \
              --jq 'sort_by(.createdAt) | reverse | .['"$KEEP"':] | .[].tagName'
          )
          for tag in "${OLD[@]}"; do
            echo "Deleting release and tag: $tag"
            gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --cleanup-tag --yes
          done
